name: Update README
on:
  schedule:
    - cron: '0 1 * * *' # Runs daily at 01:00 UTC (06:30 IST)
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  update-readme:
    name: Update dynamic sections
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update blog posts
        run: node .github/scripts/update_blog_posts.js
        continue-on-error: true

      - name: Update employment duration
        run: node .github/scripts/update_duration.js

      - name: Update recent repositories
        run: node .github/scripts/update_recent_repos.js
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Generate AI Daily Summary
        run: node .github/scripts/generate_ai_summary.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md resume.pdf
          git commit -m "Update dynamic content" || echo "No changes to commit"
          git push
